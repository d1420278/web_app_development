{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-success">會員登入</h2>
                    <p class="text-muted">歡迎回到校園惜食匹配系統</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">信箱帳號</label>
                        <input type="email" class="form-control form-control-lg bg-light" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">密碼</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold shadow-sm transition-hover">登入系統</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <span class="text-muted">還沒有帳號嗎？</span>
                    <a href="{{ url_for('auth.register') }}" class="text-success text-decoration-none fw-bold ms-1">立即註冊</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
